<!DOCTYPE html>
<html>
<head>
<title>ARE Flashcards</title>
<style>

body{
font-family:Arial;
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
width:420px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

button{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="card">

<h2 id="question"></h2>

<p id="answer" style="display:none"></p>

<button onclick="flip()">Flip</button>
<br>
<button onclick="nextCard()">Next</button>

</div>

<script>

let cards = [

{
q:"What is vicarious liability?",
a:"Liability imposed on one party for the actions of another person, such as an employer responsible for employee actions."
},

{
q:"What is modified accrual accounting?",
a:"Revenue is recorded when earned, while expenses are recorded when paid."
},

{
q:"What does the MacLeamy Curve recommend?",
a:"Allocate more effort early in design when decisions have the greatest impact."
},

{
q:"What is betterment?",
a:"The architect is responsible only for the cost difference caused by an error, not the full upgrade cost."
}

];

let i = 0;
let showingAnswer = false;

function render(){

document.getElementById("question").innerText = cards[i].q;
document.getElementById("answer").innerText = cards[i].a;

document.getElementById("question").style.display = "block";
document.getElementById("answer").style.display = "none";

showingAnswer = false;

}

function flip(){

if(showingAnswer){
document.getElementById("answer").style.display = "none";
document.getElementById("question").style.display = "block";
}else{
document.getElementById("question").style.display = "none";
document.getElementById("answer").style.display = "block";
}

showingAnswer = !showingAnswer;

}

function nextCard(){

i++;

if(i >= cards.length){
i = 0;
}

render();

}

render();

</script>

</body>
</html>
